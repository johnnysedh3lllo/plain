<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28">
	<style>
		circle { stroke: #25201b; fill: none; stroke-width: 2; }
		.dot { fill: #25201b; stroke: none; }
		@media (prefers-color-scheme: dark) {
			circle { stroke: #f4f0e3; }
			.dot { fill: #f4f0e3; }
		}
	</style>
	<circle cx="14" cy="14" r="12.5" />
	<circle cx="14" cy="14" r="8.75" />
	<circle cx="14" cy="14" r="5" />
	<circle class="dot" cx="14" cy="14" r="2.1" />
</svg>
